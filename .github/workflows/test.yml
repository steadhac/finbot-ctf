name: Test Suite with Google Sheets Reporting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pytest pytest-asyncio pytest-cov gspread google-auth google-auth-oauthlib
    
    - name: Setup database
      run: python scripts/setup_database.py

    - name: Setup Google credentials
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: echo "$GOOGLE_CREDENTIALS_JSON" > google-credentials.json

    - name: Run vendor isolation tests with Google Sheets reporting
      
      run: pytest tests/unit/vendor/test_vendor_isolation.py -v 
    
    - name: Run session management tests with Google Sheets reporting
      
      run: pytest tests/unit/auth/test_secure_session_management.py -v 

    - name: Run Specialized Business Agent tests with Google Sheets reporting
    
      run: pytest tests/unit/agents/test_specialized_agents.py -v 

